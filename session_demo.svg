    <svg id="screen" width="800" height="544" viewBox="0 0 800 544" preserveAspectRatio="xMidYMin slice">
    <rect class="background" height="100%" width="100%" x="0" y="0"/><defs><g id="g1"><text x="0" textLength="176" class="foreground">spawn ./library_system</text></g><g id="g2"><text x="0" textLength="320" class="foreground">Welcome to the Library Management System</text></g><g id="g3"><text x="0" textLength="296" class="foreground">===== Library Management System =====</text></g><g id="g4"><text x="0" textLength="96" class="foreground"> 1. Add Book</text></g><g id="g5"><text x="0" textLength="120" class="foreground"> 2. Remove Book</text></g><g id="g6"><text x="0" textLength="144" class="foreground"> 3. List All Books</text></g><g id="g7"><text x="0" textLength="128" class="foreground"> 4. Search Books</text></g><g id="g8"><text x="0" textLength="152" class="foreground"> 5. Register Member</text></g><g id="g9"><text x="0" textLength="136" class="foreground"> 6. Remove Member</text></g><g id="g10"><text x="0" textLength="160" class="foreground"> 7. List All Members</text></g><g id="g11"><text x="0" textLength="112" class="foreground"> 8. Issue Book</text></g><g id="g12"><text x="0" textLength="120" class="foreground"> 9. Return Book</text></g><g id="g13"><text x="0" textLength="240" class="foreground">10. View Member's Active Loans</text></g><g id="g14"><text x="0" textLength="144" class="foreground">11. Overdue Report</text></g><g id="g15"><text x="0" textLength="64" class="foreground"> 0. Exit</text></g><g id="g16"><text x="0" textLength="312" class="foreground">=======================================</text></g><g id="g17"><text x="0" textLength="152" class="foreground">Select an option: 1</text></g><g id="g18"><text x="0" textLength="56" class="foreground">Title: </text><text x="56" textLength="8" class="background"> </text></g><g id="g19"><text x="0" textLength="136" class="foreground">Title: Clean Code</text></g><g id="g20"><text x="0" textLength="64" class="foreground">Author: </text><text x="64" textLength="8" class="background"> </text></g><g id="g21"><text x="0" textLength="192" class="foreground">Author: Robert C. Martin</text></g><g id="g22"><text x="0" textLength="48" class="foreground">ISBN: </text><text x="48" textLength="8" class="background"> </text></g><g id="g23"><text x="0" textLength="160" class="foreground">ISBN: 978-0132350884</text></g><g id="g24"><text x="0" textLength="152" class="foreground">Number of copies: 3</text></g><g id="g25"><text x="0" textLength="168" class="foreground">Book added with ID 1.</text></g><g id="g26"><text x="0" textLength="144" class="foreground">Select an option: </text><text x="144" textLength="8" class="background"> </text></g><g id="g27"><text x="0" textLength="152" class="foreground">Select an option: 5</text></g><g id="g28"><text x="0" textLength="48" class="foreground">Name: </text><text x="48" textLength="8" class="background"> </text></g><g id="g29"><text x="0" textLength="144" class="foreground">Name: Alice Sharma</text></g><g id="g30"><text x="0" textLength="56" class="foreground">Email: </text><text x="56" textLength="8" class="background"> </text></g><g id="g31"><text x="0" textLength="192" class="foreground">Email: alice@example.com</text></g><g id="g32"><text x="0" textLength="224" class="foreground">Member registered with ID 1.</text></g><g id="g33"><text x="0" textLength="152" class="foreground">Select an option: 8</text></g><g id="g34"><text x="0" textLength="72" class="foreground">Book ID: </text><text x="72" textLength="8" class="background"> </text></g><g id="g35"><text x="0" textLength="80" class="foreground">Book ID: 1</text></g><g id="g36"><text x="0" textLength="96" class="foreground">Member ID: 1</text></g><g id="g37"><text x="0" textLength="328" class="foreground">Book issued successfully. Due in 14 days.</text></g><g id="g38"><text x="0" textLength="152" class="foreground">Select an option: 3</text></g><g id="g39"><text x="0" textLength="704" class="foreground">ID   Title                         Author              ISBN           Avail     Total   </text></g><g id="g40"><text x="0" textLength="704" class="foreground">----------------------------------------------------------------------------------------</text></g><g id="g41"><text x="0" textLength="704" class="foreground">1    Clean Code                    Robert C. Martin    978-0132350884 2         3       </text></g><g id="g42"><text x="0" textLength="152" class="foreground">Select an option: 9</text></g><g id="g43"><text x="0" textLength="216" class="foreground">Book returned successfully.</text></g><g id="g44"><text x="0" textLength="208" class="foreground">Returned on time. No fine.</text></g><g id="g45"><text x="0" textLength="152" class="foreground">Select an option: 0</text></g><g id="g46"><text x="0" textLength="64" class="foreground">Goodbye!</text></g><g id="g47"><text x="0" textLength="8" class="background"> </text></g></defs><g id="screen_view"><g><use xlink:href="#g1" y="0"/><use xlink:href="#g2" y="17"/><use xlink:href="#g3" y="51"/><use xlink:href="#g4" y="68"/><use xlink:href="#g5" y="85"/><use xlink:href="#g6" y="102"/><use xlink:href="#g7" y="119"/><use xlink:href="#g8" y="136"/><use xlink:href="#g9" y="153"/><use xlink:href="#g10" y="170"/><use xlink:href="#g11" y="187"/><use xlink:href="#g12" y="204"/><use xlink:href="#g13" y="221"/><use xlink:href="#g14" y="238"/><use xlink:href="#g15" y="255"/><use xlink:href="#g16" y="272"/><use xlink:href="#g17" y="289"/><rect x="56" y="306" width="8" height="17" class="foreground"/><use xlink:href="#g18" y="306"/></g><g><use xlink:href="#g1" y="578"/><use xlink:href="#g2" y="595"/><use xlink:href="#g3" y="629"/><use xlink:href="#g4" y="646"/><use xlink:href="#g5" y="663"/><use xlink:href="#g6" y="680"/><use xlink:href="#g7" y="697"/><use xlink:href="#g8" y="714"/><use xlink:href="#g9" y="731"/><use xlink:href="#g10" y="748"/><use xlink:href="#g11" y="765"/><use xlink:href="#g12" y="782"/><use xlink:href="#g13" y="799"/><use xlink:href="#g14" y="816"/><use xlink:href="#g15" y="833"/><use xlink:href="