<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" id="terminal" baseProfile="full" viewBox="0 0 800 546" width="800" version="1.1">
    <defs>
        <termtosvg:template_settings xmlns:termtosvg="https://github.com/nbedos/termtosvg">
            <termtosvg:screen_geometry columns="100" rows="32"/>
            <termtosvg:animation type="css"/>
        </termtosvg:template_settings>
        <style type="text/css" id="generated-style"><![CDATA[#screen {
                font-family: 'DejaVu Sans Mono', monospace;
                font-style: normal;
                font-size: 14px;
            }

        text {
            dominant-baseline: text-before-edge;
            white-space: pre;
        }
    
            :root {
                --animation-duration: 2264ms;
            }

            @keyframes roll {
                0.000%{transform:translateY(0px)}
7.553%{transform:translateY(-578px)}
19.611%{transform:translateY(-1156px)}
29.019%{transform:translateY(-1734px)}
30.433%{transform:translateY(-2312px)}
38.560%{transform:translateY(-2890px)}
50.044%{transform:translateY(-3468px)}
51.502%{transform:translateY(-4046px)}
52.959%{transform:translateY(-4624px)}
54.373%{transform:translateY(-5202px)}
55.830%{transform:translateY(-5780px)}
100.000%{transform:translateY(-5780px)}
            }

            #screen_view {
                animation-duration: 2264ms;
                animation-iteration-count:infinite;
                animation-name:roll;
                animation-timing-function: steps(1,end);
                animation-fill-mode: forwards;
            }
        ]]></style>
        <style type="text/css" id="user-style">
            /* The colors defined below are the default 16 colors used for rendering text of the terminal. Adjust
